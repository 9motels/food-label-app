<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Label Printer — Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111418; --surface: #1c2128; --border: #30363d;
      --accent: #e05c1a; --accent2: #f0893e;
      --text: #e6edf3; --muted: #7d8590;
      --success: #238636; --danger: #da3633; --radius: 14px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent; }

    header { display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent2); }
    .time-display { font-size: .95rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    .admin-link { font-size: .85rem; color: var(--muted); text-decoration: none;
      padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: transparent; }

    #printer-bar { display: flex; gap: 10px; padding: 8px 16px; background: #161b22;
      border-bottom: 1px solid var(--border); align-items: center; }
    .printer-dot { display: flex; align-items: center; gap: 6px; font-size: .78rem; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .dot.online { background: #3fb950; } .dot.offline { background: var(--danger); }

    #category-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
      scrollbar-width: none; background: var(--surface); border-bottom: 1px solid var(--border); }
    #category-bar::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: .85rem; cursor: pointer; transition: all .15s; }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px; padding: 16px; }
    .product-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 12px; text-align: center; cursor: pointer;
      transition: transform .12s, border-color .12s, background .12s; user-select: none; }
    .product-card:active { transform: scale(.96); background: #252c36; border-color: var(--accent); }
    .product-card:hover { border-color: var(--accent); background: #252c36; }
    .card-name { font-size: 1rem; font-weight: 600; line-height: 1.3; margin-bottom: 6px; }
    .card-shelf { font-size: .78rem; color: var(--muted); }

    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 100; align-items: flex-end; justify-content: center; }
    #modal-overlay.open { display: flex; }
    #modal { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px 36px;
      width: 100%; max-width: 480px; animation: slideUp .22s ease-out; }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    #modal h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 18px; color: var(--accent2); }
    .time-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .time-row label { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .time-row input[type="datetime-local"] { background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 1rem; padding: 10px 12px; width: 100%; }
    .time-row input:focus { outline: none; border-color: var(--accent); }
    .copies-row { display: flex; align-items: center; gap: 14px; margin: 16px 0 22px; }
    .copies-row label { font-size: .9rem; color: var(--muted); }
    .stepper { display: flex; align-items: center; gap: 10px; }
    .stepper button { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; }
    .stepper span { font-size: 1.1rem; font-weight: 700; min-width: 24px; text-align: center; }
    .modal-actions { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .btn:active { opacity: .8; }
    .btn-cancel { background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
    .btn-print { background: var(--accent); color: #fff; font-size: 1.1rem; }

    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--success); color: #fff; padding: 12px 24px; border-radius: 30px;
      font-weight: 600; font-size: .95rem; transition: transform .3s ease; z-index: 200; white-space: nowrap; }
    #toast.warning { background: #9a6700; }
    #toast.error   { background: var(--danger); }
    #toast.show    { transform: translateX(-50%) translateY(0); }

    /* Admin panel */
    #admin-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 50; overflow-y: auto; }
    #admin-panel.open { display: block; }
    .admin-header { display: flex; align-items: center; gap: 16px; padding: 14px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    .admin-header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent2); flex: 1; }
    .admin-main { max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }
    .admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .admin-card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .field input, .field select { background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .95rem; padding: 9px 11px; width: 100%; }
    .shelf-row { display: flex; gap: 8px; }
    .shelf-row input { flex: 1; }
    .shelf-row select { width: 110px; }
    .add-btn { padding: 10px 20px; border-radius: 9px; border: none; background: var(--accent);
      color: #fff; font-size: .9rem; font-weight: 600; cursor: pointer; }
    .product-item { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .pname { font-weight: 600; flex: 1; }
    .pmeta { font-size: .82rem; color: var(--muted); }
    .pcat  { font-size: .75rem; color: var(--muted); background: #2a3138; border-radius: 6px; padding: 2px 8px; }
    .del-btn { padding: 6px 12px; border-radius: 7px; border: none; background: var(--danger);
      color: #fff; font-size: .8rem; font-weight: 600; cursor: pointer; }
    .cat-header { font-size: .75rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; padding: 10px 4px 4px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }

    .preview-banner { background: #2a2010; border-bottom: 1px solid #5a4010; padding: 8px 16px;
      font-size: .8rem; color: #e8a820; text-align: center; }
  </style>
</head>
<body>

<div class="preview-banner">⚠️ Preview mode — print button simulates output. Connect to Raspberry Pi for real printing.</div>

<header>
  <h1>🌮 Label Printer</h1>
  <span class="time-display" id="clock"></span>
  <button class="admin-link" id="open-admin">Admin</button>
</header>

<div id="printer-bar">
  <div class="printer-dot"><span class="dot offline" id="dot-1"></span><span id="label-1">Printer 1 (offline)</span></div>
  <div class="printer-dot"><span class="dot offline" id="dot-2"></span><span id="label-2">Printer 2 (offline)</span></div>
</div>

<div id="category-bar"></div>
<div id="product-grid"></div>

<!-- Print modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title"></h2>
    <div class="time-row"><label>Prepped At</label><input type="datetime-local" id="opened-input" /></div>
    <div class="time-row"><label>Expires At</label><input type="datetime-local" id="expires-input" /></div>
    <div class="copies-row">
      <label>Copies</label>
      <div class="stepper">
        <button id="copies-down">−</button>
        <span id="copies-val">1</span>
        <button id="copies-up">+</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn btn-print" id="modal-print">🖨️ Print Label</button>
    </div>
  </div>
</div>

<!-- Admin panel -->
<div id="admin-panel">
  <div class="admin-header">
    <h1>⚙️ Admin — Products</h1>
    <button class="admin-link" id="close-admin">← Station</button>
  </div>
  <div class="admin-main">
    <div class="admin-card">
      <h2>Add Product</h2>
      <div class="form-row">
        <div class="field"><label>Product Name</label><input type="text" id="new-name" placeholder="e.g. Guacamole" /></div>
        <div class="field"><label>Category</label><input type="text" id="new-category" placeholder="e.g. Proteins" list="cat-list" /><datalist id="cat-list"></datalist></div>
      </div>
      <div class="field" style="margin-bottom:12px"><label>Shelf Life</label>
        <div class="shelf-row">
          <input type="number" id="new-shelf-value" placeholder="4" min="0.5" step="0.5" />
          <select id="new-shelf-unit"><option value="hours">Hours</option><option value="days">Days</option><option value="weeks">Weeks</option></select>
        </div>
      </div>
      <button class="add-btn" id="add-btn">Add Product</button>
    </div>
    <div class="admin-card">
      <h2>Current Products (<span id="product-count">0</span>)</h2>
      <div id="products-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---- Data ----
let products = [
  {id:1,  name:'Pico de Gallo',                category:'Salsas & Sauces', shelf_life_hours:120},
  {id:2,  name:'Salsa',                         category:'Salsas & Sauces', shelf_life_hours:168},
  {id:3,  name:'Guacamole Thaw',               category:'Salsas & Sauces', shelf_life_hours:96},
  {id:4,  name:'Guacamole Prepared',           category:'Salsas & Sauces', shelf_life_hours:24},
  {id:5,  name:'Queso — Hot Well',             category:'Salsas & Sauces', shelf_life_hours:2},
  {id:6,  name:'Queso — Refrigerated',         category:'Salsas & Sauces', shelf_life_hours:168},
  {id:7,  name:'Chicken Tinga — Thawed',       category:'Proteins',        shelf_life_hours:336},
  {id:8,  name:'Chicken Tinga — Hot Well',     category:'Proteins',        shelf_life_hours:4},
  {id:9,  name:'Flank Steak — Thawed',         category:'Proteins',        shelf_life_hours:336},
  {id:10, name:'Flank Steak — Hot Well',       category:'Proteins',        shelf_life_hours:4},
  {id:11, name:'Green Chili Pork — Thawed',    category:'Proteins',        shelf_life_hours:336},
  {id:12, name:'Green Chili Pork — Hot Well',  category:'Proteins',        shelf_life_hours:4},
  {id:13, name:'Chicken Fajita — Thawed',      category:'Proteins',        shelf_life_hours:120},
  {id:14, name:'Chicken Fajita — Hot Well',    category:'Proteins',        shelf_life_hours:4},
  {id:15, name:'Barbacoa — Thawed',            category:'Proteins',        shelf_life_hours:336},
  {id:16, name:'Barbacoa — Hot Well',          category:'Proteins',        shelf_life_hours:4},
  {id:17, name:'Corn',                          category:'Sides',           shelf_life_hours:4},
  {id:18, name:'Rice',                          category:'Sides',           shelf_life_hours:4},
  {id:19, name:'Fajita Mix',                    category:'Sides',           shelf_life_hours:4},
  {id:20, name:'Fresh Made Fajita Mix',         category:'Sides',           shelf_life_hours:120},
  {id:21, name:'Prepared Fajita Mix',           category:'Sides',           shelf_life_hours:4},
  {id:22, name:'Mexican Street Corn — Hot Well',category:'Sides',           shelf_life_hours:2},
  {id:23, name:'Black Beans — Hot Well',        category:'Sides',           shelf_life_hours:4},
  {id:24, name:'Black Beans — Refrigerated',    category:'Sides',           shelf_life_hours:120},
  {id:25, name:'Mexican Beans — Hot Well',      category:'Sides',           shelf_life_hours:4},
  {id:26, name:'Mexican Beans — Refrigerated',  category:'Sides',           shelf_life_hours:120},
  {id:27, name:'Lettuce',                        category:'Produce',         shelf_life_hours:120},
  {id:28, name:'Cilantro',                       category:'Produce',         shelf_life_hours:168},
  {id:29, name:'Limes',                          category:'Produce',         shelf_life_hours:72},
  {id:30, name:'Cheddar Cheese',                 category:'Dairy',           shelf_life_hours:168},
  {id:31, name:'Oaxaca Cheese',                  category:'Dairy',           shelf_life_hours:168},
  {id:32, name:'Liquid Eggs',                    category:'Dairy',           shelf_life_hours:96},
  {id:33, name:'Mexican Sour Cream',             category:'Dairy',           shelf_life_hours:168},
  {id:34, name:'Jalapeño Ranch',                 category:'Dressings',       shelf_life_hours:168},
  {id:35, name:'Poblano Ranch',                  category:'Dressings',       shelf_life_hours:168},
  {id:36, name:'Chipotle Ranch',                 category:'Dressings',       shelf_life_hours:168},
  {id:37, name:'Tortilla Strips',                category:'Dry Goods',       shelf_life_hours:336},
];
let nextId = 38;

// ---- Helpers ----
let activeCategory = 'All', selectedProduct = null, copies = 1;
const pad = n => String(n).padStart(2,'0');
function toDTL(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function formatForLabel(s) { const d = new Date(s); return d.toLocaleString([], {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function shelfLabel(h) {
  if (h < 1)  return Math.round(h*60) + ' min';
  if (h < 24) return h + ' hr';
  if (h < 336) { const d = h/24; return Math.round(d) + (Math.round(d)===1?' day':' days'); }
  return Math.round(h/168) + (Math.round(h/168)===1?' week':' weeks');
}

// ---- Clock ----
function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
updateClock(); setInterval(updateClock, 10000);

// ---- Station view ----
function renderCategories() {
  const cats = ['All', ...new Set(products.map(p => p.category))];
  const bar = document.getElementById('category-bar');
  bar.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; renderCategories(); renderGrid(); };
    bar.appendChild(btn);
  });
}
function renderGrid() {
  const grid = document.getElementById('product-grid');
  const filtered = activeCategory === 'All' ? products : products.filter(p => p.category === activeCategory);
  grid.innerHTML = '';
  filtered.forEach(product => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `<div class="card-name">${product.name}</div><div class="card-shelf">${shelfLabel(product.shelf_life_hours)}</div>`;
    card.onclick = () => openModal(product);
    grid.appendChild(card);
  });
}

// ---- Modal ----
function openModal(product) {
  selectedProduct = product; copies = 1;
  document.getElementById('copies-val').textContent = '1';
  const now = new Date(), expires = new Date(now.getTime() + product.shelf_life_hours * 3600000);
  document.getElementById('modal-title').textContent = product.name;
  document.getElementById('opened-input').value = toDTL(now);
  document.getElementById('expires-input').value = toDTL(expires);
  document.getElementById('modal-overlay').classList.add('open');
}
document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-overlay').classList.remove('open');
document.getElementById('modal-overlay').onclick = e => { if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open'); };
document.getElementById('copies-down').onclick = () => { if (copies > 1) { copies--; document.getElementById('copies-val').textContent = copies; } };
document.getElementById('copies-up').onclick   = () => { if (copies < 9) { copies++; document.getElementById('copies-val').textContent = copies; } };
document.getElementById('opened-input').addEventListener('change', () => {
  if (!selectedProduct) return;
  const o = new Date(document.getElementById('opened-input').value);
  document.getElementById('expires-input').value = toDTL(new Date(o.getTime() + selectedProduct.shelf_life_hours * 3600000));
});
document.getElementById('modal-print').onclick = () => {
  const opened  = formatForLabel(document.getElementById('opened-input').value);
  const expires = formatForLabel(document.getElementById('expires-input').value);
  document.getElementById('modal-overlay').classList.remove('open');
  showToast(`[Preview] Would print: ${selectedProduct.name} | Prepped: ${opened} | Expires: ${expires}`);
};

// ---- Admin panel ----
document.getElementById('open-admin').onclick  = () => { renderAdmin(); document.getElementById('admin-panel').classList.add('open'); };
document.getElementById('close-admin').onclick = () => { document.getElementById('admin-panel').classList.remove('open'); renderCategories(); renderGrid(); };

function shelfToHours(val, unit) {
  if (unit === 'weeks') return val * 168;
  if (unit === 'days')  return val * 24;
  return val;
}
function renderAdmin() {
  const cats = [...new Set(products.map(p => p.category))].sort();
  const dl = document.getElementById('cat-list');
  dl.innerHTML = cats.map(c => `<option value="${c}">`).join('');
  document.getElementById('product-count').textContent = products.length;
  const list = document.getElementById('products-list');
  list.innerHTML = '';
  const groups = {};
  products.forEach(p => { if (!groups[p.category]) groups[p.category] = []; groups[p.category].push(p); });
  Object.keys(groups).sort().forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'cat-header'; hdr.textContent = cat; list.appendChild(hdr);
    groups[cat].forEach(p => {
      const item = document.createElement('div');
      item.className = 'product-item';
      item.innerHTML = `<div style="flex:1"><div class="pname">${p.name}</div><div class="pmeta">${shelfLabel(p.shelf_life_hours)}</div></div><span class="pcat">${p.category}</span><button class="del-btn" data-id="${p.id}">Delete</button>`;
      list.appendChild(item);
    });
  });
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.id);
      const p = products.find(x => x.id === id);
      if (confirm(`Delete "${p?.name}"?`)) {
        products = products.filter(x => x.id !== id);
        renderAdmin();
        showToast('Product deleted');
      }
    };
  });
}
document.getElementById('add-btn').onclick = () => {
  const name     = document.getElementById('new-name').value.trim();
  const category = document.getElementById('new-category').value.trim() || 'General';
  const shelfVal = parseFloat(document.getElementById('new-shelf-value').value);
  const shelfUnit= document.getElementById('new-shelf-unit').value;
  if (!name || !shelfVal) return showToast('Name and shelf life required', true);
  products.push({ id: nextId++, name, category, shelf_life_hours: shelfToHours(shelfVal, shelfUnit) });
  document.getElementById('new-name').value = '';
  document.getElementById('new-shelf-value').value = '';
  renderAdmin();
  showToast(`Added: ${name}`);
};

// ---- Toast ----
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = isError ? 'error' : '';
  void t.offsetWidth; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

renderCategories(); renderGrid();
</script>
</body>
</html>
